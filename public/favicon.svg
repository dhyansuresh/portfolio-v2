<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background: near-black rounded square, matches site bg -->
  <rect width="64" height="64" rx="14" fill="#0a0603"/>

  <!-- a few faint background stars -->
  <circle cx="14" cy="13" r="1.1" fill="#f5ede0" opacity="0.5"/>
  <circle cx="50" cy="18" r="0.9" fill="#f5ede0" opacity="0.4"/>
  <circle cx="45" cy="50" r="1.2" fill="#f5ede0" opacity="0.45"/>
  <circle cx="12" cy="44" r="0.8" fill="#f5ede0" opacity="0.35"/>
  <circle cx="30" cy="9" r="0.7" fill="#f5ede0" opacity="0.3"/>
  <circle cx="55" cy="34" r="0.8" fill="#f5ede0" opacity="0.35"/>

  <!-- outer glow around the marker -->
  <circle cx="32" cy="34" r="16" fill="#c8956c" opacity="0.12"/>
  <circle cx="32" cy="34" r="11" fill="#c8956c" opacity="0.15"/>

  <!-- pulse ring -->
  <circle cx="32" cy="34" r="12.5" fill="none" stroke="#e8bfa0" stroke-width="1.6" opacity="0.75"/>

  <!-- the Earth dot: cream-to-copper, like the site marker -->
  <circle cx="32" cy="34" r="6">
    <animate attributeName="r" values="6;6.5;6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <defs>
    <radialGradient id="dot" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="#f5ede0"/>
      <stop offset="55%" stop-color="#c8956c"/>
      <stop offset="100%" stop-color="#8b5e3c"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="34" r="6" fill="url(#dot)"/>
</svg>
